name: Deploy to GitHub Pages

on:
  push: # Déclenche le déploiement à chaque push sur la branche main/master
    branches: ["main", "master"]
  workflow_dispatch: # Permet de déclencher le déploiement manuellement

# Autorisations nécessaires pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          # Permet à GitHub Pages d'héberger le dossier "dist" créé par Vite
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
